def runAnsiblePlaybook(String playbookPath, String extraArgs = '') {
    def targetHost = findProperty('target_host')
    if (!targetHost) {
        throw new GradleException(
        'target_host is required (set in ~/.gradle/gradle.properties or -Ptarget_host=...)')
    }
    println "running playbook: ${playbookPath} on host: ${targetHost}"
    def cmd = "ansible-playbook -i '${targetHost},' ${playbookPath}"
    if (extraArgs) {
        cmd += " ${extraArgs}"
    }
    exec {
        workingDir '.'
        commandLine 'bash', '-c', cmd
    }
}

def registerAnsibleTask(String name, String playbookPath, String description, String extraArgs = '') {
    tasks.register(name) {
        group = 'ansible'
        this.description = description
        doLast {
            runAnsiblePlaybook(playbookPath, extraArgs)
        }
    }
}

// generic task to run ansible playbook
tasks.register('playbook') {
    group = 'ansible'

    doLast {
        def playbook = findProperty('ansible_playbook')
        if (playbook && findProperty('target_host')) {
            runAnsiblePlaybook(playbook.toString())
        } else {
            println 'Argument Error: You must supply both target_host and ansible_playbook.'
            println 'Example: ./gradlew playbook -Ptarget_host=192.168.1.100 -Pansible_playbook=playbooks/nginx.yml'
        }
    }
}

