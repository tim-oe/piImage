# this is gps setup that works for adafruit ultimate gps
# usb board (test bed) https://www.adafruit.com/product/4279 
# hat https://www.adafruit.com/product/2324
# dev aliases
# https://unix.stackexchange.com/questions/385749/preventing-udev-symlink-overwrite
# enable serial interface
# https://www.raspberrypi.com/documentation/computers/configuration.html#serial-nonint
# disable serial console
# https://www.raspberrypi.com/documentation/computers/configuration.html#serial-console-nonint---
- name: "setup gps"
  hosts: "all"
  become: true
  vars:
    pps_gpio_pin: 4
    gpsd_config_file: "/etc/default/gpsd"
    # TODO way to check if serial dev is working
    # default when blutooth is disabled or using miniuart-bt overlay
    gps_dev: "ttyAMA0"
    # default when blutooth is enabled and not using miniuart-bt overlay
    #gps_dev: "ttyS0"
    config_file: "/boot/firmware/config.txt"
    udev_file: "/etc/udev/rules.d/100-nmea.rules"
  tasks:
    - name: "Update apt repo and cache."
      apt:
        update_cache: true
        cache_valid_time: 3600
    - name: "install gpsd"
      apt:
        name:
          - "raspi-config"
          - "gpsd"
          - "gpsd-tools"
          - "gpsd-clients"
        state: "present"
    - name: "configure gps devices"
      ansible.builtin.replace:
        path: "{{ gpsd_config_file }}"
        regexp: "^DEVICES=.*$"
        replace: 'DEVICES="/dev/gps0 /dev/pps0"'
    - name: "configure gps options"
      ansible.builtin.replace:
        path: "{{ gpsd_config_file }}"
        regexp: "^GPSD_OPTIONS=.*$"
        replace: 'GPSD_OPTIONS="-n"'
    - name: "install pps"
      apt:
        name:
          - "libcap-dev"
          - "libssl-dev"
          - "pps-tools"
        state: "present"
    - name: "enable pps channel."
      blockinfile:
        state: "present"
        insertafter: "EOF"
        dest: "{{ config_file }}"
        marker: "# {mark} _PPS_ENABLE"
        append_newline: true
        prepend_newline: true
        content: "dtoverlay=pps-gpio,gpiopin={{ pps_gpio_pin }}\n"

    - name: Check if disable-bt overlay is present in config.txt
      ansible.builtin.lineinfile:
        path: /boot/firmware/config.txt
        regexp: '^dtoverlay=disable-bt'
        state: absent
      check_mode: yes
      register: disable_bt_check
      changed_when: false

    - name: Add miniuart-bt overlay if disable-bt is not present
      ansible.builtin.lineinfile:
        path: /boot/firmware/config.txt
        line: 'dtoverlay=miniuart-bt'
        state: present
        create: no
        backup: yes
      when: not disable_bt_check.found

    - name: "remove udev linkage rule file"
      ansible.builtin.file:
        path: "{{ udev_file }}"
        state: "absent"
    - name: "create udev rules"
      copy:
        dest: "{{ udev_file }}"
        content:
          "ACTION==\"add\", SUBSYSTEM==\"tty\", KERNEL==\"{{ gps_dev }}\", SYMLINK+=\"\
          gps0\", GROUP=\"tty\"\nACTION==\"add\", SUBSYSTEM==\"pps\", KERNEL==\"pps0\"\
          , SYMLINK+=\"gpspps0\"\n"
    - name: "enable serial interface"
      command: "raspi-config nonint do_serial_hw 0"
    - name: "disable serial console"
      command: "raspi-config nonint do_serial_cons 1"
    - name: "Enable gpsd.service"
      ansible.builtin.systemd_service:
        name: "gpsd.service"
        enabled: true
        masked: false
    - name: "Enable gpsd.socket"
      ansible.builtin.systemd_service:
        name: "gpsd.socket"
        enabled: true
        masked: false
