---
- name: "install ansible"
  hosts: "all"
  become: true
  vars:
    ansible_user: tcronin
  tasks:
    - name: "remove stale Ansible apt source (PPA / old playbook)"
      ansible.builtin.file:
        path: /etc/apt/sources.list.d/ansible.list
        state: absent

    - name: "remove distro ansible package if present (replaced by pipx)"
      ansible.builtin.apt:
        name: ansible
        state: absent

    - name: "update apt cache"
      ansible.builtin.apt:
        update_cache: true
        cache_valid_time: 3600

    - name: "install pipx"
      ansible.builtin.apt:
        name:
          - pipx
          - python3-venv
        state: present

    - name: "install ansible via pipx"
      community.general.pipx:
        name: ansible
        state: latest
        install_deps: true
      become_user: "{{ ansible_user }}"

    - name: "ensure ~/.local/bin is on PATH for login shells"
      ansible.builtin.command: pipx ensurepath
      become_user: "{{ ansible_user }}"
      changed_when: false
