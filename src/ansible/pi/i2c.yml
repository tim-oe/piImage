---
- name: "install and enable ic2 interface"
  hosts: "all"
  become: true
  vars:
    config_txt_path: "/boot/firmware/config.txt"
    local_user: "tcronin"

  tasks:
    - name: "Update apt repo and cache."
      apt:
        update_cache: true
        cache_valid_time: 3600

    - name: Install I2C tools
      ansible.builtin.apt:
        name:
          - i2c-tools
          - python3-smbus
          - python3-smbus2
        state: present
        update_cache: yes
      
    - name: Enable I2C in /boot/config.txt
      ansible.builtin.lineinfile:
        path: /boot/config.txt
        regexp: '^#?dtparam=i2c_arm='
        line: 'dtparam=i2c_arm=on'
        state: present
    
    - name: Load I2C kernel module (i2c-dev)
      ansible.builtin.lineinfile:
        path: /etc/modules
        line: 'i2c-dev'
        state: present

    - name: "Add user to ic2 group"
      ansible.builtin.user:
        name: "{{ local_user }}"
        groups: i2c
        append: true

    - name: Check if I2C is already enabled in config
      ansible.builtin.command: raspi-config nonint get_i2c
      register: i2c_status
      changed_when: false
      failed_when: false
    
    - name: Enable I2C via raspi-config
      ansible.builtin.command: raspi-config nonint do_i2c 0
  
    - name: "Check if a reboot is needed on all servers."
      stat:
        path: "/var/run/reboot-required"
      register: "reboot_required_file"
    
    - name: "Reboot the box if kernel updated"
      reboot:
        msg: "Reboot initiated by Ansible for kernel updates"
        connect_timeout: 5
        reboot_timeout: 300
        pre_reboot_delay: 0
        post_reboot_delay: 10
        test_command: "uptime"
      when: "reboot_required_file.stat.exists or i2c_status.stdout == '1'"