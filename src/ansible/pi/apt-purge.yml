# this does agressive package removal
---
- name: "purge any uneeded apt packages"
  hosts: "all"
  become: true
  tasks:
    - name: "Remove build and debug tools"
      apt:
        name:
          - "build-essential"
          - "g++"
          - "g++-14"
          - "g++-14-aarch64-linux-gnu"
          - "g++-aarch64-linux-gnu"
          - "gcc"
          - "gcc-aarch64-linux-gnu"
          - "gdb"
          - "make"
          - "strace"
        state: "absent"

    - name: "Remove packaging and dev support"
      apt:
        name:
          - "debconf-i18n"
          - "dpkg-dev"
          - "fakeroot"
          - "manpages-dev"
          - "patch"
          - "pkg-config"
          - "pkgconf"
          - "pkgconf-bin"
        state: "absent"

    - name: "Remove firmware"
      apt:
        name:
          - "firmware-atheros"
          - "firmware-libertas"
          - "firmware-mediatek"
          - "firmware-realtek"
          - "flashrom"
        state: "absent"

    - name: "Remove console and keyboard"
      apt:
        name:
          - "console-setup"
          - "fbset"
          - "keyboard-configuration"
          - "xauth"
          - "xdg-user-dirs"
          - "xkb-data"
        state: "absent"

    - name: "Remove display and graphics"
      apt:
        name:
          - "kms++-utils"
          - "libdrm-amdgpu1"
          - "libdrm-common"
          - "libdrm2"
          - "libegl-mesa0"
          - "libegl1"
          - "libgbm1"
          - "libgles2"
          - "libglvnd0"
          - "libkms++0"
          - "libllvm19"
          - "libwayland-client0"
          - "libwayland-server0"
          - "libx11-6"
          - "libx11-data"
          - "libx11-xcb1"
          - "libxau6"
          - "libxcb-dri3-0"
          - "libxcb-present0"
          - "libxcb-randr0"
          - "libxcb-shm0"
          - "libxcb-sync1"
          - "libxcb-xfixes0"
          - "libxcb1"
          - "libxdmcp6"
          - "libxext6"
          - "libxmuu1"
          - "libxshmfence1"
          - "mesa-libgallium"
          - "raspinfo"
        state: "absent"

    - name: "Remove network and storage extras"
      apt:
        name:
          - "avahi-daemon"
          - "cifs-utils"
          - "ntfs-3g"
          - "ppp"
          - "ssh-import-id"
          - "usb-modeswitch"
          - "usb-modeswitch-data"
          - "wireless-tools"
        state: "absent"

    - name: "Remove RPi optional packages"
      apt:
        name:
          - "rpi-connect-lite"
          - "rpi-keyboard-config"
          - "rpi-keyboard-fw-update"
          - "rpi-loop-utils"
          - "rpi-swap"
          - "rpi-update"
          - "rpi-usb-gadget"
        state: "absent"

    - name: "Remove scripting runtimes"
      apt:
        name:
          - "lua5.1"
          - "luajit"
          - "python-babel-localedata"
          - "python-is-python3"
          - "python3-arrow"
          - "python3-babel"
          - "python3-bcrypt"
          - "python3-blinker"
          - "python3-cryptography"
          - "python3-dateutil"
          - "python3-debconf"
          - "python3-distro"
          - "python3-fqdn"
          - "python3-isoduration"
          - "python3-json-pointer"
          - "python3-jwt"
          - "python3-pip-whl"
          - "python3-rfc3339-validator"
          - "python3-rfc3986-validator"
          - "python3-rfc3987"
          - "python3-setuptools-whl"
          - "python3-typeshed"
          - "python3-uc-micro"
          - "python3-uritemplate"
          - "python3-venv"
          - "python3-webcolors"
          - "python3.13-venv"
        state: "absent"

    - name: "Remove misc system tools"
      apt:
        name:
          - "apt-listchanges"
          - "dmidecode"
          - "ed"
          - "libpam-chksshpwd"
          - "mkvtoolnix"
          - "ncdu"
          - "net-tools"
          - "pastebinit"
          - "pciutils"
          - "polkitd"
          - "shared-mime-info"
          - "udisks2"
          - "usbutils"
          - "vim*"
        state: "absent"

    - name: "Remove GPIO tools"
      apt:
        name:
          - "gpiod"
          - "libgpiod3"
          - "liblgpio1"
          - "python3-colorzero"
          - "python3-gpiozero"
          - "python3-lgpio"
          - "python3-libgpiod"
          - "python3-rpi-lgpio"
          - "python3-smbus2"
          - "python3-spidev"
        state: "absent"

    - name: "Remove documentation"
      apt:
        name:
          - "groff-base"
          - "man-db"
          - "manpages"
        state: "absent"

    - name: "Remove archive tools"
      apt:
        name:
          - "7zip"
          - "p7zip-full"
          - "unzip"
          - "zip"
        state: "absent"

    - name: "Remove audio and media extras"
      apt:
        name:
          - "alsa-topology-conf"
          - "alsa-ucm-conf"
          - "libmtp-common"
          - "libmtp-runtime"
          - "libmtp9t64"
        state: "absent"

    - name: "Remove useless packages from the cache"
      apt:
        autoclean: true

    - name: "Remove dependencies that are no longer required"
      apt:
        autoremove: true
