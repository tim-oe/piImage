---
- name: "disable camera"
  hosts: "all"
  become: true
  vars:
    config_file: "/boot/firmware/config.txt"
  tasks:
    - name: "Remove camera and video packages"
      apt:
        name:
          - "libcamera-ipa"
          - "libcamera0.7"
          - "librpicam-app1"
          - "libpisp-common"
          - "libpisp1"
          - "rpicam-apps-core"
          - "rpicam-apps-lite"
          - "v4l-utils"
        state: "absent"

    - name: Disable camera (replace any existing setting or add if missing)
      lineinfile:
        path: "{{ config_file }}"
        regexp: '^#?\s*camera_auto_detect=.*'
        line: 'camera_auto_detect=0'
        state: present

    - name: Disable camera led (replace any existing setting or add if missing)
      lineinfile:
        path: "{{ config_file }}"
        regexp: '^#?\s*disable_camera_led=.*'
        line: 'disable_camera_led=1'
        state: present
