# https://www.debian.org/doc/debian-policy/ch-opersys.html#signaling-that-a-reboot-is-required
---
- name: "Update installed packages reboot if needed"
  hosts: "all"
  become: true
  tasks:
    - name: Suppress needrestart prompts
      copy:
        dest: /etc/needrestart/conf.d/99-ansible.conf
        content: "$nrconf{restart} = 'a';\n"
      ignore_errors: yes # may not exist on all distros

    - name: "Update apt repo and cache."
      apt:
        update_cache: true
        cache_valid_time: 3600

    - name: Upgrade all packages
      apt:
        upgrade: full
        dpkg_options: "force-confdef,force-confold"
      environment:
        DEBIAN_FRONTEND: noninteractive
        NEEDRESTART_MODE: a

    - name: Check if reboot is required
      ansible.builtin.stat:
        path: /var/run/reboot-required
      register: reboot_required_file

    - name: Reboot instance if required
      ansible.builtin.reboot:
        msg: "Reboot initiated by Ansible for kernel updates"
        connect_timeout: 5
        reboot_timeout: 300
        pre_reboot_delay: 0
        post_reboot_delay: 10
        test_command: "uptime"
      when: "reboot_required_file.stat.exists"

    - name: Wait for system to be ready after reboot
      ansible.builtin.wait_for_connection:
        timeout: 300
        delay: 10
      when: reboot_required_file.stat.exists

    - name: Remove unused packages
      apt:
        autoremove: yes
        purge: yes
